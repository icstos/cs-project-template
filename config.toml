# 应用基础配置
[app]
name = "ProjectName"
version = "1.0.0"
debug = true
log_level = "INFO"

# Redis配置
[redis]
host = "localhost"
port = 6379
db = 0
password = ""
decode_responses = true

[mysql]
driver = "pymysql"         # MySQL 驱动，可选 pymysql/mysqlclient
host = "localhost"
port = 3306
username = "root"
password = ""            # 生产环境通过环境变量覆盖
database = "myapp_db"
charset = "utf8mb4"
connect_timeout = 10
pool_size = 10
max_overflow = 20
pool_recycle = 3600
echo = false
url = ""                 # 若填写 DSN，则优先使用

# API配置
[api]
prefix = "/api/v1"
timeout = 30
rate_limit = 100  # 每分钟请求数